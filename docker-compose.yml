version: "3"

services:
  # Postgres Database
  postgres:
    image: postgres:latest
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend-service:
    build:
      context: ./pythonlib
    container_name: backend-service
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  postgres-data: